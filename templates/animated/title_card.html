<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px; background: #0a0a1a;
  font-family: 'YuGothic', 'Yu Gothic', 'Noto Sans JP', sans-serif;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.container { text-align: center; position: relative; }

/* Animated background rings */
.ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(255,215,0,0.08);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  animation: ringPulse 4s ease-in-out infinite;
}
.ring:nth-child(1) { width: 500px; height: 500px; animation-delay: 0s; }
.ring:nth-child(2) { width: 700px; height: 700px; animation-delay: 0.5s; }
.ring:nth-child(3) { width: 900px; height: 900px; animation-delay: 1.0s; }

@keyframes ringPulse {
  0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.05); }
}

.main-text {
  font-size: 72px; font-weight: 900; color: #fff;
  line-height: 1.4; position: relative; z-index: 1;
}
.main-text .line {
  opacity: 0; display: block;
}
.main-text .line:nth-child(1) { animation: slideIn 0.8s ease-out 0.5s forwards; }
.main-text .line:nth-child(2) { animation: slideIn 0.8s ease-out 1.2s forwards; }

.accent {
  color: #ffd700; font-size: 88px;
}
.divider {
  width: 200px; height: 2px;
  background: linear-gradient(90deg, transparent, #ffd700, transparent);
  margin: 30px auto;
  opacity: 0; animation: fadeIn 0.8s ease-out 2.0s forwards;
}
.sub-text {
  font-size: 30px; color: #aaaacc; margin-top: 10px;
  opacity: 0; animation: fadeIn 0.8s ease-out 2.5s forwards;
  position: relative; z-index: 1;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>
<body>
<div class="container">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="main-text">
    <span class="line"><span class="accent">300万円</span>が</span>
    <span class="line">人生を変える数学的根拠</span>
  </div>
  <div class="divider"></div>
  <div class="sub-text">最初の一歩 — 動けなかったあなたへ</div>
</div>
</body>
</html>
