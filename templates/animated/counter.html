<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px; background: #0a0a1a;
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.container { text-align: center; }
.label {
  font-size: 36px; color: #aaaacc; margin-bottom: 20px;
  opacity: 0; animation: fadeIn 0.6s ease-out 0.5s forwards;
}
.number {
  font-size: 160px; font-weight: 900; color: #ffd700;
  text-shadow: 0 0 40px rgba(255,215,0,0.4);
  font-variant-numeric: tabular-nums;
}
.unit {
  font-size: 60px; color: #ffd700; opacity: 0.8;
}
.sub {
  font-size: 28px; color: #888; margin-top: 20px;
  opacity: 0; animation: fadeIn 0.6s ease-out 3.5s forwards;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="container">
  <div class="label" id="label">30年後の資産額</div>
  <div class="number"><span id="counter">0</span><span class="unit" id="unit">万円</span></div>
  <div class="sub" id="sub">元本300万円 → 年利7%複利</div>
</div>

<script>
// Counter animation
const target = 2280;
const duration = 3000; // ms
const startTime = performance.now() + 1000; // 1s delay

function easeOutExpo(t) {
  return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
}

function animate(now) {
  const elapsed = now - startTime;
  if (elapsed < 0) { requestAnimationFrame(animate); return; }
  const progress = Math.min(elapsed / duration, 1);
  const eased = easeOutExpo(progress);
  const current = Math.round(target * eased);
  document.getElementById('counter').textContent = current.toLocaleString();
  if (progress < 1) requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
