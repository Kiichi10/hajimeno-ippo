<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px; background: transparent;
  font-family: 'YuGothic', 'Yu Gothic', sans-serif;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.box {
  text-align: center;
  background: rgba(0,0,0,0.65);
  padding: 50px 80px; border-radius: 20px;
  max-width: 1200px;
}
.main {
  font-size: 60px; color: #ffffff; font-weight: 900;
  line-height: 1.5;
}
.sub {
  font-size: 30px; color: #cccccc; margin-top: 20px;
}
.accent { color: #ffd700; }
.danger { color: #ff4444; }
</style>
</head>
<body>
<div class="box">
  <div class="main"><!-- TEXT_MAIN --></div>
  <div class="sub"><!-- TEXT_SUB --></div>
</div>
</body>
</html>
