<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px; background: transparent;
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.box {
  text-align: center;
  background: rgba(0,0,0,0.85);
  padding: 50px 80px; border-radius: 20px;
  max-width: 1200px;
  opacity: 0;
  animation: fadeIn 0.6s ease-out 0.3s forwards;
}
.main {
  font-size: 60px; color: #fff; font-weight: 900;
  line-height: 1.5;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
}
.sub {
  font-size: 30px; color: #ccc; margin-top: 20px;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
  opacity: 0;
  animation: fadeIn 0.6s ease-out 1.0s forwards;
}
.accent { color: #ffd700; }
.danger { color: #ff4444; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="box">
  <div class="main"><!-- TEXT_MAIN --></div>
  <div class="sub"><!-- TEXT_SUB --></div>
</div>
</body>
</html>
